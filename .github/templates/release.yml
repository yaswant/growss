# Simulation Systems Changelog Configuration

changelog:
  # Categories are evaluated sequentially from top to bottom.
  # If a PR has multiple matching labels, it will land in the FIRST category it satisfies.

  categories:
    # (breaking-change) Critical infrastructure changes or API removals.
    - title: "💥 Breaking Changes"
      labels:
        - "breaking-change"

    # (bugfix) Placed near the top so that bug fixes always take priority
    # over general scientific updates or refactoring.
    - title: "🐛 Bug Fixes"
      labels:
        - "bugfix"

    # (feature) Standard customer-facing features and structural additions.
    - title: "✨ New Features"
      labels:
        - "feature"

    # (science) Domain-specific mathematical changes or model updates.
    # (technical) Deep algorithmic optimizations or background logic shifts.
    - title: "🔬 Scientific & Algorithmic Updates"
      labels:
        - "science"
        - "technical"

    # (documentation) Changes isolated to READMEs, inline code docstrings,
    # scientific documentation, working practices, or
    # other non-functional documentation updates.
    - title: "📚 Documentation"
      labels:
        - "documentation"

    # (performance) Direct speed execution metrics or runtime improvements.
    # (optimization) Memory, storage, or other resource optimizations.
    - title: "⚡ Performance Improvements"
      labels:
        - "performance"
        - "optimization"

    # (refactor) Code cleanup, modularisation, or other internal improvements.
    - title: "♻️ Refactoring"
      labels:
        - "refactor"

  # Global Exclusions: Any PR matching these labels will be completely hidden
  # from the final changelog output, taking ultimate precedence over categories above.
  exclude:
    labels:
      - "build" # Changes affecting build tools or external compiler toolchains.
      - "chore" # General housekeeping, license updates, or minor administrative tasks.
      - "ci" # Modifications to GitHub Actions workflows or automation systems.
      - "dependencies" # Automated third-party package upgrades (e.g., Dependabot alerts).
      - "ignore-changelog"  # Escape-hatch label to manually suppress a specific PR from the logs.
      - "test" # Changes related to testing frameworks or test cases.
      - "wip" # Work in progress PRs that are not ready for release.
