name: Shared Global Release Engine

on:
  workflow_call:

jobs:
  run-release:
    name: "Draft Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the draft release in the calling repository
    steps:
      # 1. Fetch Shared Release Template from your central public repository
      # Public repos can be fetched by anyone, but we pass GITHUB_TOKEN for private callers
      - name: Fetch Shared Release Template
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MetOffice/growss
          path: central-assets
          token: ${{ secrets.GITHUB_TOKEN }} # Ensures private callers can cross the bridge safely
          persist-credentials: false

      # 2. Fetch Active Workspace Code
      # Using tokens ensures private forks can checkout their own code safely
      - name: Fetch Active Workspace Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: local-code
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          allow-unsafe-pr-checkout: true  # allow checking out PR head refs from forks

      # 3. Inject the file from your custom templates folder into the active local workspace
      - name: Inject Configuration Layout File
        run: |
          mkdir -p local-code/.github
          cp central-assets/.github/templates/release.yml local-code/.github/release.yml

      # 4. Compile and create the native release using the injected template file
      - name: Create Native Release Entry via GitHub CLI
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd local-code
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME (Draft)" \
            --generate-notes \
            --draft
