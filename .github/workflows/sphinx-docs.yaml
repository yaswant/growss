name: Sphinx Docs

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      venv-path:
        description: 'Virtual environment path'
        required: false
        type: string
        default: '.venv'
      runner:
        description: 'The runner to use for the job'
        required: false
        type: string
        default: 'ubuntu-24.04'
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 10
      sphinx-options:
        description: 'Additional options to pass to sphinx-build or make (via SPHINXOPTS)'
        required: false
        type: string
        default: '--jobs auto --write-all --fresh-env --nitpicky --fail-on-warning --keep-going'
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        type: boolean
        default: true
      docs-dir:
        description: >
          Path to the documentation directory (where Makefile lives).
          e.g. "docs"
        required: false
        type: string
        default: 'docs'
      source-dir:
        description: >
          Path to the Sphinx source directory (where conf.py lives),
          relative to the repository root. e.g. "docs/source"
        required: false
        type: string
        default: 'docs/source'
      build-dir:
        description: >
          Path to the Sphinx build output directory, relative to docs-dir
          when using make, or relative to the repository root when using
          sphinx-build. e.g. "_build"
        required: false
        type: string
        default: '_build'
      use-pyproject:
        description: >
          Override automatic dependency resolution and force the use of
          pyproject.toml instead of conf.py. The workflow will search for
          pyproject.toml in docs-dir, source-dir, then repo root (in that
          order). Takes precedence over conf.py when set to true.
        required: false
        type: boolean
        default: false
      extras:
        description: >
          Optional dependency group to install from pyproject.toml when
          use-pyproject is true or when falling back to pyproject.toml.
          Corresponds to a key under [project.optional-dependencies] or a
          [dependency-groups] group (PEP 735). e.g. "docs" installs the
          extras defined under [project.optional-dependencies] docs = [...]
          via "uv sync --extra docs", or a dependency group via
          "uv sync --group docs".
          Leave empty to run plain "uv sync".
        required: false
        type: string
        default: ''
    outputs:
      pages-url:
        description: 'URL of the deployed GitHub Pages site'
        value: ${{ jobs.build-and-deploy.outputs.pages-url }}

permissions:
  contents: read
  pages: write  # Required for deploying to GitHub Pages
  id-token: write  # Required for authentication in uv sync when using pyproject.toml

jobs:
  build-and-deploy:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      pages-url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHON_VRSN: ${{ inputs.python-version }}
      VENV_PATH: ${{ inputs.venv-path }}
      SPHINX_DEBUG: ''
      USE_PYPROJECT: ${{ inputs.use-pyproject }}
      DOCS_DIR: ${{ inputs.docs-dir }}
      SOURCE_DIR: ${{ inputs.source-dir }}
      BUILD_DIR: ${{ inputs.build-dir }}
      SPHINX_OPTIONS: ${{ inputs.sphinx-options }}
      # Deploy only when: caller opted in AND we are on the upstream main branch
      # (not a fork's main, not a PR, not any other branch)
      DO_DEPLOY: >-
        ${{
          inputs.deploy
          && github.ref == 'refs/heads/main'
          && github.repository == github.event.repository.full_name
          && github.event_name != 'pull_request'
        }}

    steps:
      - name: Set Sphinx Debug Options
        if: ${{ runner.debug == '1' }}
        run: echo "SPHINX_DEBUG=-v --show-traceback" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv with Python ${{ env.PYTHON_VRSN }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VRSN }}

      - name: Detect dependency source
        id: detect-deps
        run: |
          # When use-pyproject is true, skip conf.py entirely and go straight
          # to pyproject.toml resolution
          if [ "${USE_PYPROJECT}" = "true" ]; then
            if [ -f "${DOCS_DIR}/pyproject.toml" ]; then
              SOURCE="pyproject-docs"
            elif [ -f "${SOURCE_DIR}/pyproject.toml" ]; then
              SOURCE="pyproject-source"
            elif [ -f "pyproject.toml" ]; then
              SOURCE="pyproject-root"
            else
              echo "::error::use-pyproject is true but no pyproject.toml found in docs-dir, source-dir, or repo root."
              exit 1
            fi
          # Default auto-detection: conf.py has highest priority
          elif [ -f "${SOURCE_DIR}/conf.py" ]; then
            SOURCE="conf"
          elif [ -f "${DOCS_DIR}/pyproject.toml" ]; then
            SOURCE="pyproject-docs"
          elif [ -f "${SOURCE_DIR}/pyproject.toml" ]; then
            SOURCE="pyproject-source"
          elif [ -f "pyproject.toml" ]; then
            SOURCE="pyproject-root"
          else
            echo "::error::No conf.py or pyproject.toml found. Cannot resolve dependencies."
            exit 1
          fi

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Dependency source detected: '$SOURCE'."

      - name: Resolve uv sync flags
        id: uv-flags
        if: steps.detect-deps.outputs.source != 'conf'
        env:
          DETECTED_SOURCE: ${{ steps.detect-deps.outputs.source }}
          EXTRA_DEPS: ${{ inputs.extras }}
        run: |
          # Determine whether `extras` refers to an optional-dependency extra
          # or a dependency-group, then set the appropriate uv sync flag.

          EXTRAS="$EXTRA_DEPS"
          [ -z "$EXTRAS" ] && { echo "flags=" >> "$GITHUB_OUTPUT"; exit 0; }

          # Locate the relevant pyproject.toml
          case "${DETECTED_SOURCE}" in
            pyproject-docs)   PYPROJECT="${DOCS_DIR}/pyproject.toml" ;;
            pyproject-source) PYPROJECT="${SOURCE_DIR}/pyproject.toml" ;;
            *)                PYPROJECT="pyproject.toml" ;;
          esac

          # Use yq to check for the extra/group and set the flag
          FLAGS=$(yq "
            (select(.project.optional-dependencies.[\"$EXTRAS\"]) | \"--extra $EXTRAS\") //
            (select(.dependency-groups.[\"$EXTRAS\"]) | \"--group $EXTRAS\") //
            \"\"
          " "$PYPROJECT")

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          [ -z "$FLAGS" ] && echo "::warning::'$EXTRAS' not found in $PYPROJECT." || echo "::notice::Resolved flags: '$FLAGS'"

      - name: Cache uv venv
        if: steps.detect-deps.outputs.source != 'conf'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.VENV_PATH }}
          key: ${{ runner.os }}-${{ env.PYTHON_VRSN }}-${{ hashFiles('pyproject.toml', format('{0}/pyproject.toml', inputs.docs-dir), format('{0}/pyproject.toml', inputs.source-dir)) }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PYTHON_VRSN }}-

      - name: Create virtual environment
        run: uv venv --python ${PYTHON_VRSN} --allow-existing ${VENV_PATH}

      - name: Install dependencies from conf.py (extensions + html_theme)
        if: steps.detect-deps.outputs.source == 'conf'
        run: |
          PACKAGES=$(python3 - <<'EOF'
          import ast, os

          source_dir = os.environ["SOURCE_DIR"]
          conf_path = os.path.join(source_dir, "conf.py")

          with open(conf_path) as f:
              tree = ast.parse(f.read())

          exts, theme = [], None
          for n in [n for n in ast.walk(tree) if isinstance(n, ast.Assign)]:
              ids = [t.id for t in n.targets if isinstance(t, ast.Name)]
              if "extensions" in ids and isinstance(n.value, (ast.List, ast.Tuple)):
                  exts = [e.value for e in n.value.elts if isinstance(e, ast.Constant)]
              if "html_theme" in ids and isinstance(n.value, ast.Constant):
                  theme = n.value.value

          # Map only extensions for which package name cannot be guessed correctly from the extension name or theme name
          MAP = {"autoapi.extension": "sphinx-autoapi", "sphinxarg.ext": "sphinx-argparse", "sphinxgallery": "sphinx-gallery",}
          BUILTIN = {"alabaster", "classic", "nature", "bizstyle", "pyramid", "scrolls", "agogo", "traditional", "haiku"}

          pkgs = {"sphinx", "sphinx-lint"}

          for e in [x for x in exts if not x.startswith("sphinx.ext.")]:
              # Try the map first, then fall back to standard naming convention
              pkgs.add(MAP.get(e, e.replace("_", "-").replace(".", "-")))

          if theme and theme not in BUILTIN:
              pkgs.add(MAP.get(theme, theme.replace("_", "-")))

          print(" ".join(sorted(pkgs)))
          EOF
          )
          uv pip install --python ${VENV_PATH}/bin/python $PACKAGES

      - name: Install dependencies via uv sync (pyproject.toml)
        if: steps.detect-deps.outputs.source != 'conf'
        env:
          DETECTED_SOURCE: ${{ steps.detect-deps.outputs.source }}
          UV_FLAGS: ${{ steps.uv-flags.outputs.flags }}
        run: |
          case "${DETECTED_SOURCE}" in
            pyproject-docs)
              TARGET_FILE="${DOCS_DIR}/pyproject.toml"
              ;;
            pyproject-source)
              TARGET_FILE="${SOURCE_DIR}/pyproject.toml"
              ;;
            pyproject-root)
              TARGET_FILE="pyproject.toml"
              ;;
            *)
              echo "::error::Unexpected dependency source: '${DETECTED_SOURCE}'."
              exit 1
              ;;
          esac

          if [ -n "$UV_FLAGS" ]; then
            echo "Installing dependencies from '$TARGET_FILE' with: uv sync $UV_FLAGS"
          else
            echo "Installing dependencies from '$TARGET_FILE' with: uv sync"
          fi

          # --project points uv at the correct pyproject.toml regardless of
          # its location; --venv-dir / UV_PROJECT_ENVIRONMENT pins the venv to
          # VENV_PATH at the repo root so it is always predictable.
          UV_PROJECT_ENVIRONMENT="${VENV_PATH}" uv sync --project "$TARGET_FILE" $UV_FLAGS

      - name: Add venv to PATH
        run: echo "${GITHUB_WORKSPACE}/${VENV_PATH}/bin" >> "$GITHUB_PATH"

      - name: Lint Sphinx docs
        run: sphinx-lint ${SOURCE_DIR}

      - name: Detect Makefile in docs directory
        id: detect-makefile
        run: |
          if [ -f "${DOCS_DIR}/Makefile" ]; then
            echo "found_makefile=true" >> "$GITHUB_OUTPUT"
            echo "Makefile detected in '${DOCS_DIR}'. Will use 'make html' to build docs."
          else
            echo "found_makefile=false" >> "$GITHUB_OUTPUT"
            echo "No Makefile detected in '${DOCS_DIR}'. Will use 'sphinx-build' to build docs."
          fi

      - name: Build HTML docs (make)
        if: steps.detect-makefile.outputs.found_makefile == 'true'
        working-directory: ${{ inputs.docs-dir }}
        run: |
          make clean html \
            SPHINXOPTS="${SPHINX_OPTIONS} ${SPHINX_DEBUG}" \
            BUILDDIR="${BUILD_DIR}"

      - name: Build HTML docs (sphinx-build)
        if: steps.detect-makefile.outputs.found_makefile == 'false'
        run: |
          sphinx-build \
            --builder html \
            ${SPHINX_OPTIONS} \
            ${SPHINX_DEBUG} \
            "${SOURCE_DIR}" \
            "${DOCS_DIR}/${BUILD_DIR}/html"

      - name: Minimize uv cache
        if: steps.detect-deps.outputs.source != 'conf'
        run: uv cache prune --ci

      # -- Deploy to GitHub Pages only on push to upstream main
      - name: Setup GitHub Pages
        if: env.DO_DEPLOY == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact to GitHub Pages
        if: env.DO_DEPLOY == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: github-pages
          path: ${{ inputs.docs-dir }}/${{ inputs.build-dir }}/html
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        if: env.DO_DEPLOY == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          DEP_SOURCE: ${{ steps.detect-deps.outputs.source }}
          MAKEFILE_FOUND: ${{ steps.detect-makefile.outputs.found }}
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
          UV_FLAGS: ${{ steps.uv-flags.outputs.flags }}
        run: |
          # Status icon
          case "$STATUS" in
            success)  ICON="✅" ;;
            failure)  ICON="❌" ;;
            cancelled) ICON="⚠️" ;;
            *)        ICON="❓" ;;
          esac

          # Dependency source label
          case "$DEP_SOURCE" in
            conf)             DEP_LABEL="\`conf.py\` (extensions + html_theme)" ;;
            pyproject-docs)   DEP_LABEL="\`pyproject.toml\` (${SOURCE_DIR})" ;;
            pyproject-source) DEP_LABEL="\`pyproject.toml\` (${SOURCE_DIR})" ;;
            pyproject-root)   DEP_LABEL="\`pyproject.toml\` (repo root)" ;;
            *)                DEP_LABEL="unknown" ;;
          esac

          # Build method label
          if [ "$MAKEFILE_FOUND" = "true" ]; then
            BUILD_METHOD="make html"
          else
            BUILD_METHOD="sphinx-build"
          fi

          # uv sync flags (empty when using conf.py)
          FLAGS="${UV_FLAGS}"
          if [ -z "$FLAGS" ]; then
            FLAGS="_(none)_"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # $ICON Sphinx Docs — $STATUS

          | | |
          |---|---|
          | **Python version** | ${PYTHON_VRSN }} |
          | **Runner** | ${RUNNER} |
          | **Dependency source** | $DEP_LABEL |
          | **uv sync flags** | $FLAGS |
          | **Build method** | $BUILD_METHOD |
          | **Docs directory** | `${DOCS_DIR}` |
          | **Source directory** | `${SOURCE_DIR}` |
          | **Build directory** | `${BUILD_DIR}` |
          | **Deploy enabled** | ${DEPLOY} |
          | **Deployed** | ${DO_DEPLOY} |

          EOF

          if [ -n "$PAGES_URL" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🌐 Published

          $PAGES_URL
          EOF
          fi
