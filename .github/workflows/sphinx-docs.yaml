name: Sphinx Docs

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      venv-path:
        description: 'Virtual environment path'
        required: false
        type: string
        default: '.venv'
      runner:
        description: 'The runner to use for the job'
        required: false
        type: string
        default: 'ubuntu-24.04'
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 5
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        type: boolean
        default: true
      docs-dir:
        description: >
          Path to the documentation directory (where Makefile lives).
          e.g. "docs"
        required: false
        type: string
        default: 'docs'
      source-dir:
        description: >
          Path to the Sphinx source directory (where conf.py lives),
          relative to the repository root. e.g. "docs/source"
        required: false
        type: string
        default: 'docs/source'
      build-dir:
        description: >
          Path to the Sphinx build output directory, relative to docs-dir
          when using make, or relative to the repository root when using
          sphinx-build. e.g. "_build"
        required: false
        type: string
        default: '_build'
    outputs:
      pages-url:
        description: 'URL of the deployed GitHub Pages site'
        value: ${{ jobs.build-and-deploy.outputs.pages-url }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      pages-url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHON_VRSN: ${{ inputs.python-version }}
      VENV_PATH: ${{ inputs.venv-path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv with Python ${{ env.PYTHON_VRSN }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VRSN }}

      - name: Detect pyproject.toml location
        id: detect-pyproject
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "location=root" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.docs-dir }}/pyproject.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "location=docs" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.source-dir }}/pyproject.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "location=source" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "location=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache uv venv
        if: ${{ steps.detect-pyproject.outputs.found == 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ env.VENV_PATH }}
          key: ${{ runner.os }}-${{ env.PYTHON_VRSN }}-${{ hashFiles('pyproject.toml', format('{0}/pyproject.toml', inputs.docs-dir), format('{0}/pyproject.toml', inputs.source-dir)) }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PYTHON_VRSN }}-

      - name: Install dependencies via uv sync (root pyproject.toml)
        if: ${{ steps.detect-pyproject.outputs.location == 'root' }}
        run: uv sync

      - name: Install dependencies via uv sync (docs pyproject.toml)
        if: ${{ steps.detect-pyproject.outputs.location == 'docs' }}
        working-directory: ${{ inputs.docs-dir }}
        run: uv sync

      - name: Install dependencies via uv sync (source pyproject.toml)
        if: ${{ steps.detect-pyproject.outputs.location == 'source' }}
        working-directory: ${{ inputs.source-dir }}
        run: uv sync

      - name: Extract Sphinx extensions from conf.py
        if: ${{ steps.detect-pyproject.outputs.found == 'false' }}
        id: extract-extensions
        run: |
          CONF_FILE="${{ inputs.source-dir }}/conf.py"
          if [ ! -f "$CONF_FILE" ]; then
            echo "Error: conf.py not found at $CONF_FILE" >&2
            exit 1
          fi
          # Extract extensions list from conf.py and map to PyPI packages
          EXTENSIONS=$(python3 - <<'EOF'
          import ast, sys

          conf_path = "${{ inputs.source-dir }}/conf.py"
          with open(conf_path) as f:
              source = f.read()

          tree = ast.parse(source)
          extensions = []
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "extensions":
                          if isinstance(node.value, (ast.List, ast.Tuple)):
                              for elt in node.value.elts:
                                  if isinstance(elt, ast.Constant):
                                      extensions.append(elt.value)

          # Map known Sphinx extensions to their PyPI package names
          ext_to_pkg = {
              "sphinx.ext.autodoc": None,
              "sphinx.ext.autosummary": None,
              "sphinx.ext.autosectionlabel": None,
              "sphinx.ext.viewcode": None,
              "sphinx.ext.napoleon": None,
              "sphinx.ext.intersphinx": None,
              "sphinx.ext.todo": None,
              "sphinx.ext.coverage": None,
              "sphinx.ext.ifconfig": None,
              "sphinx.ext.githubpages": None,
              "sphinx.ext.mathjax": None,
              "sphinx.ext.imgmath": None,
              "sphinx.ext.doctest": None,
              "sphinx.ext.duration": None,
              "sphinx.ext.graphviz": None,
              "sphinx.ext.inheritance_diagram": None,
              "myst_parser": "myst-parser",
              "myst_nb": "myst-nb",
              "nbsphinx": "nbsphinx",
              "sphinxcontrib.bibtex": "sphinxcontrib-bibtex",
              "sphinxcontrib.httpdomain": "sphinxcontrib-httpdomain",
              "sphinxcontrib.plantuml": "sphinxcontrib-plantuml",
              "sphinxcontrib.mermaid": "sphinxcontrib-mermaid",
              "sphinxcontrib.napoleon": "sphinxcontrib-napoleon",
              "sphinx_rtd_theme": "sphinx-rtd-theme",
              "sphinx_book_theme": "sphinx-book-theme",
              "pydata_sphinx_theme": "pydata-sphinx-theme",
              "furo": "furo",
              "sphinx_autodoc_typehints": "sphinx-autodoc-typehints",
              "sphinx_copybutton": "sphinx-copybutton",
              "sphinx_design": "sphinx-design",
              "sphinx_tabs": "sphinx-tabs",
              "sphinx_panels": "sphinx-panels",
              "sphinx_togglebutton": "sphinx-togglebutton",
              "autoapi.extension": "sphinx-autoapi",
              "sphinx_autoapi": "sphinx-autoapi",
              "breathe": "breathe",
              "exhale": "exhale",
              "sphinx_click": "sphinx-click",
              "sphinxarg.ext": "sphinx-argparse",
              "sphinx_argparse_cli": "sphinx-argparse-cli",
              "sphinx_sitemap": "sphinx-sitemap",
              "sphinxcontrib.rsvgconverter": "sphinxcontrib-rsvgconverter",
          }

          pkgs = {"sphinx", "sphinx-lint"}
          for ext in extensions:
              pkg = ext_to_pkg.get(ext)
              if pkg is not None:
                  pkgs.add(pkg)
              elif not ext.startswith("sphinx."):
                  # Unknown third-party extension: use ext root as package guess
                  pkg_guess = ext.split(".")[0].replace("_", "-")
                  pkgs.add(pkg_guess)

          print(" ".join(sorted(pkgs)))
          EOF
          )
          echo "packages=$EXTENSIONS" >> "$GITHUB_OUTPUT"

      - name: Install dependencies from conf.py extensions (no pyproject.toml)
        if: ${{ steps.detect-pyproject.outputs.found == 'false' }}
        run: uv pip install --system ${{ steps.extract-extensions.outputs.packages }}

      - name: Lint Sphinx docs
        run: uv run sphinx-lint ${{ inputs.source-dir }}

      - name: Detect Makefile in docs directory
        id: detect-makefile
        run: |
          if [ -f "${{ inputs.docs-dir }}/Makefile" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build HTML docs (make)
        if: ${{ steps.detect-makefile.outputs.found == 'true' }}
        working-directory: ${{ inputs.docs-dir }}
        run: uv run make clean html BUILDDIR="${{ inputs.build-dir }}"

      - name: Build HTML docs (sphinx-build)
        if: ${{ steps.detect-makefile.outputs.found == 'false' }}
        run: |
          uv run sphinx-build \
            --builder html \
            --fresh-env \
            --write-all \
            "${{ inputs.source-dir }}" \
            "${{ inputs.docs-dir }}/${{ inputs.build-dir }}/html"

      - name: Minimize uv cache
        if: ${{ steps.detect-pyproject.outputs.found == 'true' }}
        run: uv cache prune --ci

      # -- Deploy to GitHub Pages only on push to upstream main
      - name: Setup GitHub Pages
        if: ${{ inputs.deploy }}
        uses: actions/configure-pages@v5

      - name: Upload artifact to GitHub Pages
        if: ${{ inputs.deploy }}
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          path: ${{ inputs.docs-dir }}/${{ inputs.build-dir }}/html
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ inputs.deploy }}
        uses: actions/deploy-pages@v4
