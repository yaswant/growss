name: Label PR

on:
  workflow_call:

permissions: {}

jobs:
  label:
    name: Label
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.fork }}
    permissions:
      contents: read  # Required for checking out code or referencing internal workflow actions
      pull-requests: write  # Required for the composite action to add or remove labels on the PR
    steps:
      - name: Add label `contributor`
        if: ${{ github.event.action == 'opened' }}
        uses: MetOffice/growss/labeler@main
        with:
          issue: ${{ github.event.number }}
          label: contributor
          action: add

      - name: Remove label `approved-for-ci`
        if: ${{ github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'approved-for-ci') }}
        uses: MetOffice/growss/labeler@main
        with:
          issue: ${{ github.event.number }}
          label: approved-for-ci
          action: remove
