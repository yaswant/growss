name: Lint
on:
  workflow_call:
    inputs:
      runner:
        description: "The runner to use for the job"
        required: false
        type: string
        default: "ubuntu-latest"
      timeout:
        description: "The maximum time in minutes the job can run for"
        required: false
        type: number
        default: 10
      python-version:
        description: "The Python version to use"
        required: false
        type: string
        default: "3.14"
      fortitude-version:
        description: "The Fortitude linter version to use"
        required: false
        type: string
        default: "0.7.3"
      file-extensions:
        description: "Comma-separated list of Fortran file extensions to check"
        required: false
        type: string
        default: "f90,F90,x90,X90,t90,T90,pf,PF"
      respect-gitignore:
        description: "Whether to respect .gitignore files"
        required: false
        type: boolean
        default: true
      show-fixes:
        description: "Whether to show suggested fixes"
        required: false
        type: boolean
        default: true
      show-statistics:
        description: "Whether to show statistics"
        required: false
        type: boolean
        default: true
      source-path:
        description: "Path to source code directory to lint"
        required: false
        type: string
        default: "."
      config-path:
        description: "Path to configuration file with rules"
        required: false
        type: string
      fail-on-error:
        description: "Whether to fail the workflow on linting errors"
        required: false
        type: boolean
        default: true
      enable-cache:
        description: "Whether to enable UV cache"
        required: false
        type: boolean
        default: false

jobs:
  fortran-linting:
    name: Fortran
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}

    env:
      UV_PYTHON: ${{ inputs.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup uv and Python ${{ env.UV_PYTHON }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # 8.2.0
        with:
          python-version: ${{ env.UV_PYTHON }}
          enable-cache: ${{ inputs.enable-cache }}

      - name: Run Fortitude Linter
        env:
          FORTITUDE_VERSION: ${{ inputs.fortitude-version }}
          FILE_EXTENSIONS: ${{ inputs.file-extensions }}
          CONFIG_PATH: ${{ inputs.config-path }}
          SOURCE_PATH: ${{ inputs.source-path }}
        run: |
          uvx --from "fortitude-lint==$FORTITUDE_VERSION" fortitude check \
            ${{ inputs.respect-gitignore && '--respect-gitignore' || '' }} \
            ${{ inputs.show-fixes && '--show-fixes' || '' }} \
            ${{ inputs.show-statistics && '--statistics' || '' }} \
            "--file-extensions=$FILE_EXTENSIONS" \
            ${CONFIG_PATH:+"--config-file=$CONFIG_PATH"} \
            "$SOURCE_PATH"
        continue-on-error: ${{ !inputs.fail-on-error }}
